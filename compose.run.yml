# NanoScribe — end-user runtime compose file.
#
# Pulls the published image from GHCR. No source tree, no bind mounts on code,
# only a single ./data volume for the SQLite DB, audio files, and model cache.
#
# Usage:
#   docker compose -f compose.run.yml up -d
#   open http://localhost:8000
#
# Requires an NVIDIA GPU + nvidia-container-toolkit on the host.
#
services:
  nanoscribe:
    image: ghcr.io/lsj5031/nanoscribe:latest
    container_name: nanoscribe
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - NANOSCRIBE_DATA_DIR=/app/data
      - MODELSCOPE_CACHE=/app/data/.modelscope_cache
      - NANOSCRIBE_OFFLINE=0
      - HF_HUB_OFFLINE=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # Optional: bearer token for the OpenAI-compatible /v1/audio/transcriptions endpoint.
      # - NANOSCRIBE_API_KEY=change-me
      # Optional: use a remote OpenAI-compatible API instead of the local GPU.
      # - NANOSCRIBE_REMOTE_ASR_URL=https://api.openai.com/v1
      # - NANOSCRIBE_REMOTE_ASR_API_KEY=sk-...
      # - NANOSCRIBE_REMOTE_ASR_MODEL=whisper-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Telegram Bot ─────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
    container_name: nanoscribe-bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    volumes:
      - ./bot/bot.py:/app/bot.py:ro
    tmpfs:
      - /tmp:size=2G
    depends_on:
      - nanoscribe
    networks:
      - default

  # ── Telegram Local API Server (optional, for files >20MB) ───────
  telegram-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-api
    restart: unless-stopped
    profiles:
      - telegram-api      # Only started when explicitly requested
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
      - TELEGRAM_LOCAL=true
    volumes:
      - telegram-api-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qS -O /dev/null http://127.0.0.1:8081 2>&1 | grep -q 'HTTP/'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default

volumes:
  telegram-api-data:
