services:
  funasr:
    build:
      context: .
      args:
        BASE_IMAGE: ${BASE_IMAGE:-nvidia/cuda:12.4.1-runtime-ubuntu22.04}
      target: ${DOCKER_TARGET:-dev}
    image: nanoscribe:dev
    container_name: nanoscribe-dev
    stdin_open: true
    tty: true
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ~/.cache/huggingface:/home/appuser/.cache/huggingface
      - ~/.cache/modelscope:/home/appuser/.cache/modelscope
      - ./data:/app/data
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - HF_HUB_OFFLINE=0
      - MODELSCOPE_CACHE=/app/data/.modelscope_cache
      - NANOSCRIBE_DATA_DIR=/app/data
      - NANOSCRIBE_OFFLINE=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NANOSCRIBE_STATIC_DIR=/app/frontend/build
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app/backend
    command:
      - /app/venv/bin/python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  # ── Telegram Bot ─────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
    container_name: nanoscribe-bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    volumes:
      - ./bot/bot.py:/app/bot.py:ro
    tmpfs:
      - /tmp:size=2G
    depends_on:
      - funasr
    networks:
      - default

  # ── Telegram Local API Server (optional, for files >20MB) ───────
  telegram-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-api
    restart: unless-stopped
    profiles:
      - telegram-api      # Only started when explicitly requested
    env_file:
      - ./bot/.env
    environment:
      - TELEGRAM_LOCAL=true
    volumes:
      - telegram-api-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qS -O /dev/null http://127.0.0.1:8081 2>&1 | grep -q 'HTTP/'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default

volumes:
  telegram-api-data:
