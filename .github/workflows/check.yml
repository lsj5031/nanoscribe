name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff format --check
        run: ruff format --check .

      - name: ruff check
        run: ruff check .

      - name: ty check
        run: ty check .

      - name: pytest
        run: |
          # GPU-dependent tests (transcription, diarization) are skipped —
          # they require CUDA + FunASR/3D-Speaker models unavailable in CI.
          pytest -q --ignore=tests/test_transcription.py --ignore=tests/test_diarization.py

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # NOTE: first run pulls nvidia/cuda (~2 GB) and installs PyTorch CUDA
      # wheels (~2 GB). Expect 10–20 min on cold cache; subsequent runs
      # benefit from GHA layer caching.
      - name: Build Docker image (system stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: system
          # Build but don't push — validates the base image, Python 3.10,
          # system deps (ffmpeg, libsndfile), CUDA PyTorch, and runtime
          # pip packages all install correctly.
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SvelteKit types
        run: pnpm svelte-kit sync

      - name: svelte-check
        run: pnpm check

      - name: prettier format check
        run: pnpm format:check
