name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff format --check
        run: ruff format --check .

      - name: ruff check
        run: ruff check .

      - name: ty check
        run: ty check .

      - name: pytest
        run: pytest -q --ignore=tests/test_transcription.py --ignore=tests/test_diarization.py

      - name: Integration tests (requires ML deps)
        if: false  # Skip integration tests in CI - they require GPU + models
        run: pytest tests/test_transcription.py -x -k Integration -v || true

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SvelteKit types
        run: pnpm svelte-kit sync

      - name: svelte-check
        run: pnpm check

      - name: prettier format check
        run: pnpm format:check
