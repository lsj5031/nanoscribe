name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for GitHub Release
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        # The CUDA + ML wheels alone push the image past 8 GB.
        # The runner only has ~14 GB free by default; reclaim what we can.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Only tag 'latest' on stable semver tags (e.g. v0.1.0, not v0.1.0-beta).
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build and load for smoke test
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Smoke test
        run: |
          # Extract first tag for docker run
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "Smoke-testing image: $FIRST_TAG"

          # Run container (no GPU in CI — health endpoint responds anyway)
          docker run -d --name nanoscribe-smoke -p 8000:8000 "$FIRST_TAG"

          # Poll health endpoint.  The Dockerfile HEALTHCHECK has a 60 s
          # start-period; we give it up to 120 s (24 × 5 s).
          echo "Waiting for container to respond..."
          HEALTHY=0
          for i in $(seq 1 24); do
            if curl -fsS http://localhost:8000/api/system/health > /tmp/health.json 2>/dev/null; then
              echo "Health check passed:"
              cat /tmp/health.json
              HEALTHY=1
              break
            fi
            echo "  attempt $i/24 — waiting 5s..."
            sleep 5
          done

          if [ "$HEALTHY" -eq 0 ]; then
            echo "ERROR: Container failed to respond within 120s"
            echo "--- container logs ---"
            docker logs nanoscribe-smoke
            docker rm -f nanoscribe-smoke
            exit 1
          fi

          # Clean up
          docker rm -f nanoscribe-smoke

      - name: Push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
